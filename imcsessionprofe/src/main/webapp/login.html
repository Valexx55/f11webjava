<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar sesión</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <main class="contenedor-login">

        <section class="tarjeta-login">

            <h1>Iniciar sesión</h1>

            <p class="descripcion">
                Introduce tus credenciales para acceder.
            </p>

            <form action="login" method="post">

                <div class="campo">
                    <label for="usuario">
                        Usuario
                    </label>

                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="password">
                        Contraseña
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <p
                    id="mensaje-error"
                    class="mensaje-error oculto"
                    role="alert"
                >
                    Usuario o contraseña incorrectos.
                </p>

                <button type="submit">
                    Entrar
                </button>

            </form>

        </section>

    </main>

    

</body>
</html>
