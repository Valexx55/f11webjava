<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="estiloimc.css">
    <script src="imc.js" defer></script>
</head>
<body>

    <div class="container">
        <h2>Calculadora de IMC</h2>
        <form id="imcForm">
            <div class="form-group">
                <label for="peso">Peso (kg):</label>
                <input type="number" id="peso" step="0.1" placeholder="Ej. 75.5" required>
            </div>
            <div class="form-group">
                <label for="altura">Estatura (metros):</label>
                <input type="number" id="altura" step="0.01" placeholder="Ej. 1.75" required>
            </div>
            <button type="submit">Calcular IMC</button>
        </form>

        <div id="resultado" class="result-box"></div>
    </div>

</body>
</html>
