<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<h1>Calculadora de IMC</h1>

	<form action="CalculoIMCJsp" method="post">

		<div>
			<label for="peso">Peso en kg:</label> <input type="number" id="peso"
				name="peso" step="0.01" min="1" required>
		</div>

		<div>
			<label for="altura">Altura en metros:</label> <input type="number"
				id="altura" name="altura" step="0.01" min="0.1" required>
		</div>

		<button type="submit">Calcular IMC</button>

	</form>


</body>
</html>
